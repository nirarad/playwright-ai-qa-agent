name: Playwright + AI QA Agent

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      qa_mode:
        description: 'QA mode to inject for this run'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - selector-change
          - logic-bug
          - auth-break
          - slow-network

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright showcase suite
        id: playwright
        env:
          BASE_URL: https://playwright-ai-qa-agent.vercel.app/
          QA_MODE: ${{ github.event.inputs.qa_mode || 'none' }}
          CI: true
        run: npx playwright test -c tests/playwright.config.ts
        continue-on-error: true

      - name: Add run context to summary
        if: ${{ !cancelled() }}
        run: |
          echo '## Run context' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- **BASE_URL**: https://playwright-ai-qa-agent.vercel.app/' >> "$GITHUB_STEP_SUMMARY"
          echo '- **QA_MODE**: `${{ github.event.inputs.qa_mode || 'none' }}`' >> "$GITHUB_STEP_SUMMARY"
          echo '- **Playwright outcome**: `${{ steps.playwright.outcome }}`' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

      - name: Configure GitHub Pages
        if: >
          ${{
            !cancelled() &&
            github.event_name != 'pull_request' &&
            (github.ref_name == 'main' || github.ref_name == 'develop')
          }}
        uses: actions/configure-pages@v5

      - name: Upload HTML report to Pages
        if: >
          ${{
            !cancelled() &&
            github.event_name != 'pull_request' &&
            (github.ref_name == 'main' || github.ref_name == 'develop')
          }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: test-results/html-report

      - name: Deploy HTML report to Pages
        id: pages
        if: >
          ${{
            !cancelled() &&
            github.event_name != 'pull_request' &&
            (github.ref_name == 'main' || github.ref_name == 'develop')
          }}
        uses: actions/deploy-pages@v4

      - name: Add HTML report link to run summary
        if: >
          ${{
            !cancelled() &&
            github.event_name != 'pull_request' &&
            (github.ref_name == 'main' || github.ref_name == 'develop')
          }}
        run: |
          echo '## Playwright HTML report' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- **Report**: '"${{ steps.pages.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Run AI Failure Agent
        if: >
          steps.playwright.outcome == 'failure' &&
          !cancelled()
        env:
          AGENT_ENABLE_IN_CI: 'true'
          AGENT_ENABLE_HEAL_PR: 'false'
          AGENT_ENABLE_BUG_ISSUE: ${{ vars.AGENT_ENABLE_BUG_ISSUE == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'true' || 'false' }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'mock' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'mock-classifier-v1' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run agent

      - name: Mark job failed if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
